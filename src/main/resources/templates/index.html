<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine To-Do-Liste</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; background: #f5f5f5; color: #222; }
        nav { margin-bottom: 1.5rem; }
        nav a { margin-right: 1rem; color: #0055cc; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        table { border-collapse: collapse; width: 100%; background: white; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 0.6rem 1rem; text-align: left; }
        th { background-color: #e8e8e8; }
        button { cursor: pointer; }
        .erfolg { color: green; font-weight: bold; }
        .fehler { color: red; font-weight: bold; }
        .status-done {color: green; font-weight: bold; }
        .status-in-progress { color: #e67e00; font-weight: bold; }
        .status-on-hold { color: #888; }
        .status-not-started { color: #cc0000; }
    </style>
</head>
<body>
<h1>Meine To-Do-Liste</h1>
<nav>
    <a href="/todo/neu">+ Neues To-Do</a>
    <a href="/kategorien">Kategorien verwalten</a>
</nav>

<p th:if="${erfolg}" th:text="${erfolg}" class="erfolg"></p>
<p th:if="${fehler}" th:text="${fehler}" class="fehler"></p>

<table>
    <tr>
        <th>Titel</th>
        <th>Beschreibung</th>
        <th>Kategorie</th>
        <th>Status</th>
        <th>Aktionen</th>
    </tr>
    <tr th:each="todo : ${todo}" th:classappend="${todo.status != null and todo.status.name() == 'DONE'} ? 'erledigt' : ''">
        <td th:text="${todo.titel}"></td>
        <td th:text="${todo.beschreibung}"></td>
        <td th:text="${todo.category != null ? todo.category.name : '-'}"></td>
        <td th:text="${todo.status != null ? todo.status.displayName : '-'}"
            th:classappend="${todo.status != null and todo.status.name() == 'DONE'} ? 'status-done' :
                                (${todo.status != null and todo.status.name() == 'IN_PROGRESS'} ? 'status-in-progress' :
                                (${todo.status != null and todo.status.name() == 'ON_HOLD'} ? 'status-on-hold' : 'status-not-started'))">
        </td>

        <td>
            <a th:href="@{/todo/bearbeiten/{id}(id=${todo.id})}">Bearbeiten</a>
            &nbsp;
            <form th:action="@{/todo/loeschen/{id}(id=${todo.id})}"
                  method="post" style="display:inline"
                  onsubmit="return confirm('Dieses To-Do wirklich löschen?')">
                <button type="submit">Löschen</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(todo)}">
        <td colspan="5">Noch keine To-Dos vorhanden.</td>
    </tr>
</table>
</body>
</html>
