<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <title>To-Do bearbeiten</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; color: #222; }
        label { display: block; margin-top: 1rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 0.4rem; margin-top: 0.3rem; box-sizing: border-box; }
        button { margin-top: 1.5rem; padding: 0.5rem 1.5rem; cursor: pointer; }
        .fehler { color: red; font-weight: bold; }
    </style>
</head>
<body>
<h1 th:text="${todo.id == null ? 'Neues To-Do' : 'To-Do bearbeiten'}"></h1>

<p th:if="${fehler}" th:text="${fehler}" class="fehler"></p>

<form th:action="@{/todo/speichern}" th:object="${todo}" method="post">
    <input type="hidden" th:field="*{id}">

    <label for="titel">Titel</label>
    <input type="text" id="titel" th:field="*{titel}" required>

    <label for="beschreibung">Beschreibung</label>
    <textarea id="beschreibung" th:field="*{beschreibung}" rows="3"></textarea>

    <label for="erledigt">Erledigt</label>
    <select id="erledigt" th:field="*{erledigt}">
        <option value="false">Nein</option>
        <option value="true">Ja</option>
    </select>

    <label for="category">Kategorie</label>
    <select id="category" th:field="*{category.id}">
        <option value="">-- Keine Kategorie --</option>
        <option th:each="kat : ${kategorien}"
                th:value="${kat.id}"
                th:text="${kat.name}"></option>
    </select>

    <button type="submit">Speichern</button>
    &nbsp;
    <a href="/">Abbrechen</a>
</form>
</body>
</html>
